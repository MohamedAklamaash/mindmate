name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  release:
    types: [published]

jobs:
  build-and-push:
    name: Build & push backend image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mindmate-ai
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ai_services
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run -d -p 9000:9000 --name smoke \
            -e GOOGLE_API_KEY=dummy \
            -e POSTGRES_DB_URL=postgresql://u:p@localhost/db \
            -e MONGODB_URL=mongodb://localhost/db \
            ${{ secrets.DOCKERHUB_USERNAME }}/mindmate-ai:latest || true
          sleep 8
          curl -f http://localhost:9000/ || echo "smoke test skipped (needs live DB)"
          docker rm -f smoke || true
